name: eval-chess-backend
description: >-
  Build a python-chess-backed FastAPI chess API (games, moves, legal-moves)
  on port 8003; grade it against the pagehub-evals "eval-chess-backend"
  conformance battery.

target_repo: git@github.com:pagehub-io/eval-chess-backend.git
target_start: empty
build_prompt_file: prompts/eval-chess-backend.md

grader:
  # The standalone pagehub-evals service (its docker-compose maps the API to
  # :8002). (:4002 was the old platform/evals/ service — not this one.)
  evals_base_url: http://localhost:8002
  # Path within the pagehub-evals repo checkout (resolved relative to
  # PAGEHUB_EVALS_REPO, default ~/github/pagehub-io/pagehub-evals).
  fixture_bundle: fixtures/eval-chess-backend.json
  collection: eval-chess-backend
  env:
    # The pagehub-evals run engine fires HTTP from inside its own container, so
    # the built service (running on the host's :8003) must be addressed as
    # host.docker.internal:8003, not localhost:8003. (The runner rewrites this
    # back to localhost for its own host-side health probe.) The bundle's
    # "chess-local" environment is PATCHed with this value at grade time, so a
    # run can also repoint it (different host / port / a worktree deployment).
    eval-chess-backend_url: http://host.docker.internal:8003

max_attempts: 5

# The matrix: one run per entry.
harnesses:
  - harness: claude-code
    model: claude-opus-4-7
    config:
      effort: xhigh
