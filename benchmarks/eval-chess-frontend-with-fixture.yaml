name: eval-chess-frontend-with-fixture
description: >-
  Treatment variant of eval-chess-frontend that injects the grader fixture
  bundle directly into the build prompt (via {{ grader_fixture }}). Same
  target repo, same grader, same harness matrix — only the build prompt
  differs. Paired with benchmarks/eval-chess-frontend.yaml under the
  eval-fixture-injection theory.

target_repo: git@github.com:pagehub-io/eval-chess-frontend.git
target_start: empty
build_prompt_file: prompts/eval-chess-frontend-with-fixture.md

grader:
  # The standalone pagehub-evals service (its docker-compose maps the API to
  # :8002). Same as eval-chess-frontend.
  evals_base_url: http://localhost:8002
  # Path within the pagehub-evals repo checkout (resolved relative to
  # PAGEHUB_EVALS_REPO, default ~/github/pagehub-io/pagehub-evals).
  fixture_bundle: fixtures/eval-chess-frontend.json
  collection: eval-chess-frontend
  env:
    # pagehub-evals fires HTTP from inside its own docker container, so
    # services on the HOST must be addressed via host.docker.internal —
    # both the headless-browser service AND the frontend it will drive.
    # The bundle's "chess-frontend-local" environment is PATCHed with these
    # values at grade time, so a run can repoint either at a worktree-local
    # deployment without editing the bundle.
    #
    # Order matters: the runner's readiness probe (`run.py::_health_url`)
    # picks the FIRST *_url here and waits for `<localhost>/health` to
    # answer. That MUST be the built service we're grading (port 8004),
    # NOT pagehub-browser (already up on :4010 → would short-circuit the
    # probe and start grading before `make up` is even ready).
    eval-chess-frontend_url: http://host.docker.internal:8004
    pagehub-browser_url:     http://host.docker.internal:4010

max_attempts: 5

# The matrix: one run per entry. Identical to eval-chess-frontend so the
# theory's baseline-vs-treatment comparison varies only on the prompt.
harnesses:
  - harness: claude-code
    model: claude-opus-4-7
    config:
      effort: xhigh
