name: ci

# CI runs lint + the unit tests ONLY. It must never run a real benchmark —
# that invokes `claude` and pagehub-evals, costs tokens, and needs secrets.
# The runner is exercised here through FakeHarness / FakeGrader.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest -q
